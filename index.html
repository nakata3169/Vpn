<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Vault VPN</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: #ecedf6; overflow-x: hidden; }
        .glow-button { box-shadow: 0 0 20px rgba(177, 255, 206, 0.1); transition: all 0.3s ease; }
        .connecting { animation: pulse 1.5s infinite; border-color: #b1ffce !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="flex flex-col min-h-screen pb-20">
    <header class="flex justify-between items-center px-6 h-16 w-full bg-[#10131a]">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#b1ffce]">shield</span>
            <span class="text-lg font-black tracking-[0.2em]">KINETIC VAULT</span>
        </div>
    </header>

    <main class="flex-1 px-4 py-6 space-y-6">
        <div class="bg-[#1c2028] p-5 rounded-2xl border border-white/5">
            <p class="text-[10px] uppercase tracking-widest opacity-40 mb-2">Protocol</p>
            <h2 id="protocol-name" class="text-2xl font-black italic">WIREGUARD</h2>
        </div>

        <div class="bg-[#1c2028] p-5 rounded-2xl border border-white/5 flex justify-between items-center">
            <div>
                <p class="text-[10px] uppercase tracking-widest opacity-40 mb-2">Virtual IP</p>
                <h3 id="ip-display" class="text-xl font-bold">192.158.1.38</h3>
            </div>
            <button onclick="location.reload()" class="p-2"><span class="material-symbols-outlined opacity-60">refresh</span></button>
        </div>

        <div class="flex flex-col items-center justify-center py-8">
            <button id="connect-btn" onclick="handleConnect()" class="glow-button relative w-48 h-48 rounded-full bg-[#1c2028] border-4 border-[#b1ffce]/20 flex flex-col items-center justify-center gap-2">
                <span id="power-icon" class="material-symbols-outlined text-5xl text-[#b1ffce]">power_settings_new</span>
                <span id="status-text" class="text-xs font-bold tracking-[0.3em] uppercase mt-2">CONNECT</span>
            </button>
        </div>
        
        </main>

    <script>
        let isConnected = false;
        function handleConnect() {
            const btn = document.getElementById('connect-btn');
            const statusText = document.getElementById('status-text');
            const icon = document.getElementById('power-icon');
            const ipDisplay = document.getElementById('ip-display');

            if (navigator.vibrate) navigator.vibrate(40); // Telefonda titreşim

            if (!isConnected) {
                btn.classList.add('connecting');
                statusText.innerText = "SHIELDING...";
                setTimeout(() => {
                    btn.classList.remove('connecting');
                    btn.style.borderColor = "#b1ffce";
                    icon.style.color = "#b1ffce";
                    statusText.innerText = "CONNECTED";
                    ipDisplay.innerText = "1.1.1.1";
                    isConnected = true;
                }, 1500);
            } else {
                statusText.innerText = "CONNECT";
                btn.style.borderColor = "";
                icon.style.color = "";
                ipDisplay.innerText = "192.158.1.38";
                isConnected = false;
            }
        }
    </script>
</body>
</html>
